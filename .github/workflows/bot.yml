name: Telegram Bot Runner

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ----------------------------------------------
      # CACHE: pip packages (versioned)
      # ----------------------------------------------
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}-${{ hashFiles('.cache-version') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ----------------------------------------------
      # CACHE: Playwright browsers (versioned)
      # ----------------------------------------------
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}-${{ hashFiles('.cache-version') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # ----------------------------------------------
      # CACHE: Donut Browser (versioned)
      # ----------------------------------------------
      - name: Cache Donut Browser
        uses: actions/cache@v4
        with:
          path: |
            donut.AppImage
            squashfs-root/
          key: ${{ runner.os }}-donut-${{ hashFiles('.cache-version') }}
          restore-keys: |
            ${{ runner.os }}-donut-

      # ----------------------------------------------
      # Install dependencies (pip will use cache)
      # ----------------------------------------------
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      # ----------------------------------------------
      # Download & extract Donut (if not cached)
      # ----------------------------------------------
      - name: Setup Donut Browser
        run: |
          if [ ! -f "donut.AppImage" ]; then
            wget -O donut.AppImage https://github.com/zhom/donutbrowser/releases/latest/download/donut-latest-x86_64.AppImage
            chmod +x donut.AppImage
            ./donut.AppImage --appimage-extract
          fi
          nohup ./squashfs-root/AppRun &
          sleep 5
          echo "✅ Donut Browser ready"

      # ----------------------------------------------
      # Run the bot
      # ----------------------------------------------
      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          echo "🚀 Starting bot..."
          python bot.py
