name: Telegram Donut Bot (Fingerprint Rotation)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ProtonVPN CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv openvpn
          python3 -m pip install --user protonvpn-cli
          export PATH="$PATH:$HOME/.local/bin"
          # Initialize ProtonVPN
          protonvpn-cli init --no-news

      - name: Connect to ProtonVPN (random free server)
        run: |
          export PATH="$PATH:$HOME/.local/bin"
          # Login
          echo "simonshichet899@gmail.com" | protonvpn-cli login simonshichet899@gmail.com Shichet+123
          # Connect to random free server
          protonvpn-cli connect -r
          sleep 10
          echo "✅ VPN connected"
          curl -s https://api.ipify.org?format=json || echo "VPN connection failed"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chrome

      - name: Run bot
        run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

      - name: Commit updated used_fingerprints.json (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_fingerprints.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update fingerprint cooldown"
          git push
