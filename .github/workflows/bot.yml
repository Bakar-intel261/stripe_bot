name: Telegram Donut Bot (Fingerprint Rotation)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OpenVPN and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn curl jq

      - name: Setup ProtonVPN OpenVPN config
        run: |
          # Create auth file with OpenVPN credentials
          echo "TKns6zrWuLiQxg9K" > /tmp/auth.txt
          echo "Jv1hsQCPF9X9DjPRIZQPsJHkyEiRRkVM" >> /tmp/auth.txt
          sudo mv /tmp/auth.txt /etc/openvpn/auth.txt
          sudo chmod 600 /etc/openvpn/auth.txt
          
          # Download ProtonVPN free server config (US server)
          sudo curl -o /etc/openvpn/protonvpn-us.ovpn https://raw.githubusercontent.com/ProtonVPN/protonvpn-openvpn/master/ProtonVPN_OpenVPN_Free_US.ovpn

      - name: Connect to ProtonVPN
        run: |
          echo "🌐 Connecting to ProtonVPN..."
          sudo openvpn --config /etc/openvpn/protonvpn-us.ovpn --auth-user-pass /etc/openvpn/auth.txt --daemon
          sleep 15
          echo "✅ VPN connected"
          echo "🖥️ Checking IP address..."
          IP=$(curl -s https://api.ipify.org?format=json | jq -r '.ip' 2>/dev/null || echo "Failed to get IP")
          echo "🖥️ Current IP: $IP"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chrome

      - name: Run bot
        run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

      - name: Commit updated used_fingerprints.json (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_fingerprints.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update fingerprint cooldown"
          git push
