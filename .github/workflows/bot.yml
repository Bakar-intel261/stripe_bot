name: Telegram Donut Bot (Fingerprint Rotation)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn curl jq

      - name: Create config and credentials
        run: |
          sudo mkdir -p /etc/openvpn
          sudo tee /etc/openvpn/auth.txt > /dev/null << AUTH
TKns6zrWuLiQxg9K
Jv1hsQCPF9X9DjPRIZQPsJHkyEiRRkVM
AUTH
          sudo chmod 600 /etc/openvpn/auth.txt

          sudo tee /etc/openvpn/protonvpn.ovpn > /dev/null << OVPN
client
dev tun
proto udp
remote us-01.protonvpn.com 1194
resolv-retry infinite
nobind
persist-key
persist-tun
remote-cert-tls server
verify-x509-name ProtonVPN_Free_US name
auth-user-pass /etc/openvpn/auth.txt
comp-lzo
verb 3
OVPN

      - name: Connect to ProtonVPN
        run: |
          echo "🌐 Connecting to ProtonVPN..."
          sudo openvpn --config /etc/openvpn/protonvpn.ovpn --auth-user-pass /etc/openvpn/auth.txt --daemon
          sleep 20
          echo "✅ VPN connected"
          echo "🖥️ Current IP:"
          curl -s https://api.ipify.org

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chrome

      - name: Run bot
        run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

      - name: Commit updated used_fingerprints.json (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_fingerprints.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update fingerprint cooldown"
          git push
