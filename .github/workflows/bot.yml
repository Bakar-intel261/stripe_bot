name: Telegram Donut Bot (Fingerprint Rotation)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OpenVPN and connect
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn curl jq
          
          # Create auth file
          echo "TKns6zrWuLiQxg9K" > /tmp/auth.txt
          echo "Jv1hsQCPF9X9DjPRIZQPsJHkyEiRRkVM" >> /tmp/auth.txt
          
          # Download working config (US Free)
          curl -o /tmp/config.ovpn "https://raw.githubusercontent.com/ProtonVPN/protonvpn-openvpn/master/ProtonVPN_OpenVPN_Free_US.ovpn"
          
          # Connect in background
          sudo openvpn --config /tmp/config.ovpn --auth-user-pass /tmp/auth.txt --daemon
          
          # Wait for connection
          sleep 20
          
          # Show IP
          echo "🖥️ Current IP:"
          curl -s https://api.ipify.org

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chrome

      - name: Run bot
        run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          PROXY_URL: ${{ secrets.PROXY_URL }}

      - name: Commit updated used_fingerprints.json (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_fingerprints.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update fingerprint cooldown"
          git push
