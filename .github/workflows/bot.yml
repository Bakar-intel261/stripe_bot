name: Telegram Donut Bot (Fingerprint Rotation)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn curl jq

      - name: Setup ProtonVPN config and credentials
        run: |
          # Create working config file (US Free Server)
          sudo bash -c 'cat > /etc/openvpn/protonvpn.ovpn << "EOL"
client
dev tun
proto udp
remote us-01.protonvpn.com 1194
remote us-02.protonvpn.com 1194
remote us-03.protonvpn.com 1194
remote us-04.protonvpn.com 1194
remote us-05.protonvpn.com 1194
remote us-06.protonvpn.com 1194
remote us-07.protonvpn.com 1194
remote us-08.protonvpn.com 1194
remote us-09.protonvpn.com 1194
remote us-10.protonvpn.com 1194
remote us-11.protonvpn.com 1194
remote us-12.protonvpn.com 1194
remote us-13.protonvpn.com 1194
remote us-14.protonvpn.com 1194
remote us-15.protonvpn.com 1194
remote us-16.protonvpn.com 1194
resolv-retry infinite
nobind
persist-key
persist-tun
remote-cert-tls server
verify-x509-name ProtonVPN_Free_US name
auth-user-pass /etc/openvpn/auth.txt
comp-lzo
verb 3
EOL'

          # Add credentials
          sudo bash -c 'echo "TKns6zrWuLiQxg9K" > /etc/openvpn/auth.txt'
          sudo bash -c 'echo "Jv1hsQCPF9X9DjPRIZQPsJHkyEiRRkVM" >> /etc/openvpn/auth.txt'
          sudo chmod 600 /etc/openvpn/auth.txt

      - name: Connect to ProtonVPN
        run: |
          echo "🌐 Connecting to ProtonVPN..."
          sudo openvpn --config /etc/openvpn/protonvpn.ovpn --auth-user-pass /etc/openvpn/auth.txt --daemon
          sleep 20
          echo "✅ VPN connected"
          echo "🖥️ Checking IP address..."
          IP=$(curl -s https://api.ipify.org?format=json | jq -r '.ip' 2>/dev/null || echo "Failed to get IP")
          echo "🖥️ Current IP: $IP"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chrome

      - name: Run bot
        run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

      - name: Commit updated used_fingerprints.json (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_fingerprints.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update fingerprint cooldown"
          git push
