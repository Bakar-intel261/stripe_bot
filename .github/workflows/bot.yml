name: Telegram Donut Bot (Fingerprint Rotation)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ProtonVPN (free tier)
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn curl
          sudo curl -o /etc/openvpn/update-resolv-conf https://raw.githubusercontent.com/ProtonVPN/scripts/master/update-resolv-conf
          sudo chmod +x /etc/openvpn/update-resolv-conf
          sudo curl -o /etc/openvpn/protonvpn-nl.ovpn https://raw.githubusercontent.com/ProtonVPN/protonvpn-openvpn/master/ProtonVPN_OpenVPN_Free_NL.ovpn
          echo "simonshichet899@gmail.com" > /tmp/auth.txt
          echo "Shichet+123" >> /tmp/auth.txt
          sudo mv /tmp/auth.txt /etc/openvpn/auth.txt
          sudo chmod 600 /etc/openvpn/auth.txt

      - name: Connect to ProtonVPN
        run: |
          sudo openvpn --config /etc/openvpn/protonvpn-nl.ovpn --auth-user-pass /etc/openvpn/auth.txt --daemon
          sleep 15
          echo "✅ VPN connected"
          curl -s https://api.ipify.org?format=json || echo "VPN connection failed"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chrome

      - name: Run bot
        run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

      - name: Commit updated used_fingerprints.json (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_fingerprints.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update fingerprint cooldown"
          git push
