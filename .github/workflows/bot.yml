name: Telegram Donut Bot (Fingerprint Rotation)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OpenVPN and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn curl jq

      - name: Get free server from ProtonVPN API
        run: |
          echo "🔄 Fetching free servers from ProtonVPN API..."
          curl -s https://api.protonvpn.ch/v1/logicals -o /tmp/servers.json
          
          SERVER_NAME=$(cat /tmp/servers.json | jq -r '.LogicalServers[] | select(.Features | contains([2])) | .Name' | shuf -n 1)
          SERVER_IP=$(cat /tmp/servers.json | jq -r --arg name "$SERVER_NAME" '.LogicalServers[] | select(.Name == $name) | .Servers[] | select(.Status == 1) | .EntryIP' | head -1)
          
          echo "✅ Selected server: $SERVER_NAME ($SERVER_IP)"
          
          cat > /tmp/protonvpn.ovpn << EOF
client
dev tun
proto udp
remote $SERVER_IP 1194
resolv-retry infinite
nobind
persist-key
persist-tun
remote-cert-tls server
verify-x509-name $SERVER_NAME name
auth-user-pass /tmp/auth.txt
comp-lzo
verb 3
