name: Telegram Donut Bot (Fingerprint Rotation)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ProtonVPN and connect to random free server
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn curl jq
          
          # Download ProtonVPN server list
          curl -s https://api.protonvpn.ch/v1/logicals -o /tmp/servers.json
          
          # Filter free servers and pick one randomly
          SERVER=$(cat /tmp/servers.json | jq -r '.LogicalServers[] | select(.Features | contains([2])) | .Servers[] | select(.Status == 1) | .EntryIP' | shuf -n 1)
          echo "Selected server: $SERVER"
          
          # Download config for the selected server
          sudo curl -o /etc/openvpn/protonvpn.ovpn "https://api.protonvpn.ch/v1/OpenVPNConfiguration?server=$SERVER&protocol=udp"
          
          echo "simonshichet899@gmail.com" > /tmp/auth.txt
          echo "Shichet+123" >> /tmp/auth.txt
          sudo mv /tmp/auth.txt /etc/openvpn/auth.txt
          sudo chmod 600 /etc/openvpn/auth.txt

      - name: Connect to ProtonVPN
        run: |
          sudo openvpn --config /etc/openvpn/protonvpn.ovpn --auth-user-pass /etc/openvpn/auth.txt --daemon
          sleep 15
          echo "✅ VPN connected"
          echo "VPN IP:"
          curl -s https://api.ipify.org?format=json || echo "VPN connection failed"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chrome

      - name: Run bot
        run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

      - name: Commit updated used_fingerprints.json (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_fingerprints.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update fingerprint cooldown"
          git push
