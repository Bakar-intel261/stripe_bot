name: Run Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *'

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          playwright install --with-deps chromium

      - name: Cache Donut Browser
        id: cache-donut
        uses: actions/cache@v4
        with:
          path: ./donut.AppImage
          key: ${{ runner.os }}-donut-0.28.2

      - name: Setup Donut Browser (fixed)
        if: steps.cache-donut.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/zhon/donutbrowser/releases/download/v0.28.2/Donut-0.28.2_amd64.AppImage -O donut.AppImage
          chmod +x donut.AppImage

      - name: Run Bot
        run: |
          python your_bot_script.py
