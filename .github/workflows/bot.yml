name: Telegram Donut Bot (Fingerprint Rotation)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OpenVPN and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn curl jq

      - name: Get free server and create config
        run: |
          echo "🔄 Fetching free servers from ProtonVPN API..."
          curl -s https://api.protonvpn.ch/v1/logicals -o /tmp/servers.json
          
          SERVER_NAME=$(cat /tmp/servers.json | jq -r '.LogicalServers[] | select(.Features | contains([2])) | .Name' | shuf -n 1)
          SERVER_IP=$(cat /tmp/servers.json | jq -r --arg name "$SERVER_NAME" '.LogicalServers[] | select(.Name == $name) | .Servers[] | select(.Status == 1) | .EntryIP' | head -1)
          
          echo "✅ Selected server: $SERVER_NAME ($SERVER_IP)"
          
          # Create config file directly
          sudo bash -c "cat > /etc/openvpn/protonvpn.ovpn << EOL
client
dev tun
proto udp
remote $SERVER_IP 1194
resolv-retry infinite
nobind
persist-key
persist-tun
remote-cert-tls server
verify-x509-name $SERVER_NAME name
auth-user-pass /etc/openvpn/auth.txt
comp-lzo
verb 3
EOL"

      - name: Setup credentials
        run: |
          sudo bash -c "echo 'TKns6zrWuLiQxg9K' > /etc/openvpn/auth.txt"
          sudo bash -c "echo 'Jv1hsQCPF9X9DjPRIZQPsJHkyEiRRkVM' >> /etc/openvpn/auth.txt"
          sudo chmod 600 /etc/openvpn/auth.txt

      - name: Connect to ProtonVPN
        run: |
          echo "🌐 Connecting to ProtonVPN..."
          sudo openvpn --config /etc/openvpn/protonvpn.ovpn --auth-user-pass /etc/openvpn/auth.txt --daemon
          sleep 15
          echo "✅ VPN connected"
          echo "🖥️ Checking IP address..."
          IP=$(curl -s https://api.ipify.org?format=json | jq -r '.ip' 2>/dev/null || echo "Failed to get IP")
          echo "🖥️ Current IP: $IP"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chrome

      - name: Run bot
        run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

      - name: Commit updated used_fingerprints.json (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_fingerprints.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update fingerprint cooldown"
          git push
