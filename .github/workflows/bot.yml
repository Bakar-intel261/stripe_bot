name: Telegram Donut Bot (Fingerprint Rotation)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ProtonVPN CLI
        run: |
          echo "📦 Installing ProtonVPN CLI..."
          sudo apt-get update
          sudo apt-get install -y openvpn
          python3 -m pip install --user protonvpn-cli
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "✅ ProtonVPN CLI installed"

      - name: Connect to ProtonVPN (random free server)
        run: |
          export PATH="$PATH:$HOME/.local/bin"
          echo "🔑 Initializing ProtonVPN..."
          protonvpn-cli init --no-news
          
          echo "🔐 Logging in..."
          protonvpn-cli login simonshichet899@gmail.com Shichet+123
          
          echo "🌐 Connecting to random free server..."
          protonvpn-cli connect -r
          sleep 10
          
          echo "✅ VPN connected"
          echo "🖥️ Checking IP address..."
          IP=$(curl -s https://api.ipify.org?format=json | jq -r '.ip' 2>/dev/null || echo "Failed to get IP")
          echo "🖥️ Current IP: $IP"
          
          # Additional IP check
          echo "📡 IP Info:"
          curl -s https://ipinfo.io || echo "IP info failed"

      - name: Install dependencies
        run: |
          echo "📦 Installing Python dependencies..."
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chrome
          echo "✅ Dependencies installed"

      - name: Run bot
        run: |
          echo "🤖 Starting bot..."
          python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

      - name: Commit updated used_fingerprints.json (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_fingerprints.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update fingerprint cooldown"
          git push
