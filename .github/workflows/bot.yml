name: Telegram Donut Bot

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 xvfb wget \
            libx11-xcb1 libxcb-dri3-0 libdrm2 libgbm1 \
            libasound2t64 libegl1 libgl1 libgl1-mesa-dri libgles2 \
            libxcb-xfixes0 libxcb-shm0 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxrandr2 libxtst6 \
            libnss3 libatk-bridge2.0-0

      - name: Download Donut AppImage
        run: |
          wget -O /tmp/donut.AppImage \
            https://github.com/zhom/donutbrowser/releases/download/v0.28.2/Donut_0.28.2_amd64.AppImage
          chmod +x /tmp/donut.AppImage
          cd /tmp
          ./donut.AppImage --appimage-extract
          mkdir -p ~/.local/bin
          mv squashfs-root ~/.local/bin/donut

      - name: Force-enable MCP via config & env
        run: |
          mkdir -p ~/.config/DonutBrowser
          mkdir -p ~/.config/donutbrowser
          echo '{"mcp_enabled": true, "mcp_port": 10108}' | tee ~/.config/DonutBrowser/settings.json ~/.config/donutbrowser/settings.json

      - name: Start Donut with API
        run: |
          export DISPLAY=:99
          export LIBGL_ALWAYS_SOFTWARE=1
          export XDG_RUNTIME_DIR=/tmp/runtime-runner
          export MCP_ENABLED=true
          export MCP_PORT=10108
          mkdir -p $XDG_RUNTIME_DIR
          xvfb-run -a --server-args="-screen 0 1024x768x24" \
            ~/.local/bin/donut/AppRun --no-sandbox --api --mcp-server --mcp-port=10108 \
            2> /tmp/donut.log &
          sleep 20
          for i in {1..30}; do
            if curl -s http://localhost:10108/v1/status > /dev/null; then
              echo "✅ Donut API is ready"
              break
            fi
            echo "⏳ Waiting for Donut API... ($i/30)"
            sleep 2
          done
          if ! curl -s http://localhost:10108/v1/status > /dev/null; then
            echo "❌ API not ready – logs:"
            cat /tmp/donut.log
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start bot
        run: python bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
